{% extends "base.html" %}
{% block title %}Login Admin - Chendra Grill{% endblock %}

{% block content %}
<section class="login-hero">
    <div class="login-card">
        <div class="login-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/>
                <rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>
            </svg>
        </div>
        <h1 class="login-title">Dashboard Dapur</h1>
        <p class="login-desc">Masukkan password admin untuk mengakses dashboard</p>

        {% if error %}
        <div class="login-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/admin/login" class="login-form">
            <div class="login-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="Masukkan password admin" autofocus required>
            </div>
            <button type="submit" class="btn btn-primary login-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Masuk
            </button>
        </form>

        <a href="/" class="login-back">Kembali ke menu</a>
    </div>
</section>
{% endblock %}
